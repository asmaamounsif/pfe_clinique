server {
    listen 80;
    server_name localhost;

    # Serveur de fichiers statiques (React Build)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Crucial pour React Router : redirige toutes les routes non-physiques vers index.html
        try_files $uri $uri/ /index.html;
    }

    # Proxy facultatif pour rediriger /api directement en conteneur Docker si configuré
    location /api/ {
        proxy_pass http://gateway:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
